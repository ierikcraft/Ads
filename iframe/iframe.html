<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdGestor - No Disponible</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        #errorContainer {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255, 0, 85, 0.25);
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.95), rgba(5, 5, 5, 0.95));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 8px;
            gap: 4px;
            overflow: hidden;
        }

        .icon {
            font-size: 20px;
            filter: drop-shadow(0 0 5px rgba(255, 0, 85, 0.4));
            animation: pulse 2s infinite;
        }

        .title {
            font-size: 13px;
            font-weight: 800;
            color: #ff0055;
            letter-spacing: -0.01em;
        }

        .message {
            font-size: 10px;
            color: #aaaaaa;
            max-width: 90%;
            line-height: 1.3;
        }

        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(1); }
        }

        /* Responsive adaptations for different iframe dimensions */
        
        /* 1. Horizontal banner (e.g. 728x90) */
        @media (max-height: 100px) {
            #errorContainer {
                flex-direction: row;
                gap: 12px;
                padding: 4px 16px;
                justify-content: center;
            }
            .icon {
                font-size: 16px;
            }
            .title {
                font-size: 12px;
            }
            .message {
                font-size: 10px;
                max-width: none;
            }
        }

        /* 2. Micro/Mini widgets or very narrow banners */
        @media (max-width: 150px) {
            .icon {
                font-size: 16px;
            }
            .title {
                font-size: 11px;
            }
            .message {
                font-size: 9px;
            }
        }
    </style>
</head>

<body>
    <div id="errorContainer">
        <span class="icon">🚫</span>
        <span class="title">AdGestor</span>
        <span class="message">Ya no está disponible</span>
    </div>
</body>

</html>
