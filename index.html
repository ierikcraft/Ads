<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdGestor - Crea y Gestiona tus Anuncios</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        p {
            font-size: 1.5rem;
            color: #ccc;
            max-width: 600px;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .features {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .feature {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem 2rem;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            color: var(--primary-color);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero animate-fade-in">
            <h1>AdGestor</h1>
            <p>La plataforma publicitaria del futuro. Llega a milies de personas con un solo click.</p>
            
            <div class="features">
                <div class="feature">🚀 10.000 Visualizaciones Gratis</div>
                <div class="feature">⚡ Sin Complicaciones</div>
            </div>

            <a href="home/index.html" class="btn" style="padding: 1rem 3rem; font-size: 1.2rem;">Empezar Ahora</a>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
